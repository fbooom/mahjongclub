name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to 24.16.0: Node 22.23.0/24.17.0+ ship a security patch that
          # breaks HTTP keep-alive, causing firebase-tools OAuth token fetches to
          # fail with "Premature close" (firebase/firebase-tools#10692, unfixed
          # in latest npm release as of 2026-06-25). Revert once a patched
          # firebase-tools release ships.
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: mahjong-club-da606
          channelId: live
